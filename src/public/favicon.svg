<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="seal" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#e0bc63"/>
      <stop offset="55%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#8a6f2c"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="64" height="64" rx="14" fill="#0b0906"/>

  <!-- wax seal blob (irregular, hand-pressed look) -->
  <path d="M32 8
           C 42 8, 50 13, 52 22
           C 54 30, 50 34, 53 41
           C 56 48, 50 54, 42 54
           C 38 56, 34 58, 28 56
           C 20 58, 12 52, 11 43
           C 10 36, 15 32, 12 24
           C 10 16, 18 10, 26 9
           C 28 8, 30 8, 32 8 Z"
        fill="url(#seal)"/>

  <!-- hourglass mark pressed into the seal -->
  <g fill="none" stroke="#3a2a10" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M25 20 H39 M25 44 H39"/>
    <path d="M25 20 C25 27, 32 29, 32 32 C32 35, 25 37, 25 44"/>
    <path d="M39 20 C39 27, 32 29, 32 32 C32 35, 39 37, 39 44"/>
  </g>
</svg>
